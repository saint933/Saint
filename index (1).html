// ── Map init ─────────────────────────────────────────────────────────────────
var map = L.map('map').setView([-2.0035, 30.1269], 15);

var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
});

var satelliteLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; Esri World Imagery', maxZoom: 19 }
);

osmLayer.addTo(map);
L.control.layers(
    { 'Street Map': osmLayer, 'Satellite': satelliteLayer },
    {}, { position: 'topright' }
).addTo(map);


// ── Land use colors ──────────────────────────────────────────────────────────
function getColor(landuse) {
    switch ((landuse || '').trim()) {
        case 'Residential': return '#8B4513';
        case 'Agriculture':  return '#228B22';
        case 'Commercial':   return '#CC0000';
        case 'Open space':   return '#4A90D9';
        default:             return '#888888';
    }
}

// ── Style ────────────────────────────────────────────────────────────────────
function styleParcel(feature) {
    return {
        fillColor:   getColor(feature.properties.Landuse),
        fillOpacity: 0.72,
        weight:      0.8,
        color:       '#444',
        opacity:     1
    };
}

// ── Area formatter ────────────────────────────────────────────────────────────
function formatArea(sqm) {
    if (!sqm && sqm !== 0) return 'N/A';
    var n = parseFloat(sqm);
    if (isNaN(n)) return 'N/A';
    if (n >= 10000) return (n / 10000).toFixed(4) + ' ha';
    return n.toFixed(2) + ' m²';
}

// ── Popup & hover ─────────────────────────────────────────────────────────────
var parcelsLayer;

function onEachFeature(feature, layer) {
    var p = feature.properties;
    var upi      = p.upi        || 'N/A';
    var area     = p.Shape_Area || p.st_area_sh || null;
    var landuse  = p.Landuse    || 'Unknown';
    var parcelNo = p.parcel_num || '';
    var color    = getColor(landuse);

    var html =
        '<div class="parcel-popup">' +
          '<div class="popup-title">Parcel No. ' + parcelNo + '</div>' +
          '<table>' +
            '<tr><td>UPI</td><td>' + upi + '</td></tr>' +
            '<tr><td>Area</td><td>' + formatArea(area) + '</td></tr>' +
            '<tr><td>Land Use</td><td>' +
              '<span class="badge" style="background:' + color + '">' + landuse + '</span>' +
            '</td></tr>' +
            '<tr><td>Village</td><td>' + (p.village || '') + '</td></tr>' +
            '<tr><td>Sector</td><td>' + (p.sector  || '') + '</td></tr>' +
            '<tr><td>District</td><td>' + (p.district || '') + '</td></tr>' +
          '</table>' +
        '</div>';

    layer.bindPopup(html, { maxWidth: 280 });

    layer.on({
        mouseover: function(e) {
            e.target.setStyle({ weight: 2.5, color: '#FFD700', fillOpacity: 0.92 });
            e.target.bringToFront();
        },
        mouseout: function(e) {
            parcelsLayer.resetStyle(e.target);
        }
    });
}

// ── Render GeoJSON ────────────────────────────────────────────────────────────
parcelsLayer = L.geoJSON(muyange_data, {
    style: styleParcel,
    onEachFeature: onEachFeature
}).addTo(map);

map.fitBounds(parcelsLayer.getBounds(), { padding: [20, 20] });

document.getElementById('parcel-count').textContent =
    muyange_data.features.length.toLocaleString() + ' parcels';


// ── Legend ────────────────────────────────────────────────────────────────────
var legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML =
        '<b>Land Use</b>' +
        '<div><i style="background:#8B4513"></i>Residential</div>' +
        '<div><i style="background:#228B22"></i>Agriculture</div>' +
        '<div><i style="background:#CC0000"></i>Commercial</div>' +
        '<div><i style="background:#4A90D9"></i>Open Space</div>';
    return div;
};
legend.addTo(map);


// ── Info box ──────────────────────────────────────────────────────────────────
var infoBox = L.control({ position: 'bottomleft' });
infoBox.onAdd = function() {
    var div = L.DomUtil.create('div', 'info-panel');
    div.innerHTML =
        '<strong>Muyange Cell &mdash; Kagarama, Kicukiro</strong><br>' +
        '<span id="parcel-count">Loading...</span>';
    return div;
};
infoBox.addTo(map);

</script>
