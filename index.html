<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Muyange Village — Parcel Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #f0a500;
      --residential: #3b82f6; --commercial: #f59e0b;
      --agriculture: #22c55e; --openspace: #a78bfa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:1000; }
    .header-left h1 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; }
    .header-left h1 span { color:var(--accent); }
    .header-left p { font-size:0.72rem; color:var(--muted); margin-top:2px; }
    .header-stats { display:flex; gap:20px; }
    .stat { text-align:right; }
    .stat-num { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; color:var(--accent); display:block; }
    .stat-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .main { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:270px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
    .sidebar-section { padding:16px; border-bottom:1px solid var(--border); }
    .sidebar-section h3 { font-family:'Syne',sans-serif; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:12px; }
    .legend-item { display:flex; align-items:center; gap:10px; margin-bottom:8px; cursor:pointer; padding:6px 8px; border-radius:6px; transition:background .15s; }
    .legend-item:hover { background:rgba(255,255,255,.05); }
    .legend-item.hidden { opacity:.35; }
    .legend-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
    .legend-label { font-size:.8rem; flex:1; }
    .legend-count { font-size:.7rem; color:var(--muted); font-family:'Syne',sans-serif; font-weight:600; }
    .filter-group { margin-bottom:10px; }
    .filter-group label { font-size:.72rem; color:var(--muted); display:block; margin-bottom:4px; }
    select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 8px; border-radius:6px; font-size:.78rem; font-family:'DM Sans',sans-serif; cursor:pointer; outline:none; }
    select:focus { border-color:var(--accent); }
    .btn { width:100%; padding:8px; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:6px; font-family:'Syne',sans-serif; font-weight:700; font-size:.78rem; cursor:pointer; margin-top:6px; transition:all .15s; }
    .btn:hover { border-color:var(--accent); color:var(--accent); }
    #info-panel { padding:16px; flex:1; }
    #info-panel h3 { font-family:'Syne',sans-serif; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:12px; }
    .info-placeholder { font-size:.78rem; color:var(--muted); line-height:1.8; }
    .info-placeholder span { display:block; font-size:1.4rem; margin-bottom:6px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:.75rem; }
    .info-row:last-child { border-bottom:none; }
    .info-key { color:var(--muted); }
    .info-val { color:var(--text); font-weight:500; max-width:145px; text-align:right; word-break:break-all; }
    .landuse-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.68rem; font-weight:700; font-family:'Syne',sans-serif; }
    .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.68rem; font-weight:700; font-family:'Syne',sans-serif; }
    #map { flex:1; position:relative; }
    .leaflet-control-zoom a { background:var(--surface)!important; color:var(--text)!important; border-color:var(--border)!important; }
    .leaflet-control-zoom a:hover { background:var(--border)!important; }
    .leaflet-control-scale-line { background:rgba(22,27,34,.85); border-color:var(--border); color:var(--muted); font-size:.68rem; }

    /* ── Popup styles ── */
    .leaflet-popup-content-wrapper {
      background: #1c2333;
      border: 1px solid #f0a500;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-tip-container { margin-top: -1px; }
    .leaflet-popup-tip { background: #f0a500; }
    .leaflet-popup-content { margin: 0; width: 260px !important; }
    .leaflet-popup-close-button {
      color: #8b949e !important;
      font-size: 18px !important;
      top: 8px !important;
      right: 10px !important;
      z-index: 10;
    }
    .leaflet-popup-close-button:hover { color: #f0a500 !important; }

    .popup-header {
      background: linear-gradient(135deg, #f0a500, #e07b00);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .popup-header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .popup-header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: #000;
      line-height: 1.2;
    }
    .popup-header-sub {
      font-size: 0.68rem;
      color: rgba(0,0,0,0.6);
      margin-top: 2px;
    }
    .popup-body { padding: 12px 16px; }
    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.76rem;
    }
    .popup-row:last-child { border-bottom: none; }
    .popup-key { color: #8b949e; }
    .popup-val { color: #e6edf3; font-weight: 500; text-align: right; max-width: 140px; word-break: break-all; }
    .popup-badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 20px; font-size: 0.66rem;
      font-weight: 700; font-family: 'Syne', sans-serif;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Muyange <span>Village</span> Parcel Map</h1>
    <p>Kagarama Sector · Kicukiro District · Kigali City, Rwanda</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <span class="stat-num" id="visible-count">—</span>
      <span class="stat-label">Parcels shown</span>
    </div>
    <div class="stat">
      <span class="stat-num">578</span>
      <span class="stat-label">Total parcels</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Land Use</h3>
      <div class="legend-item" data-landuse="Residential" onclick="toggleLanduse(this)">
        <div class="legend-dot" style="background:var(--residential)"></div>
        <span class="legend-label">Residential</span>
        <span class="legend-count" id="cnt-Residential">—</span>
      </div>
      <div class="legend-item" data-landuse="Commercial" onclick="toggleLanduse(this)">
        <div class="legend-dot" style="background:var(--commercial)"></div>
        <span class="legend-label">Commercial</span>
        <span class="legend-count" id="cnt-Commercial">—</span>
      </div>
      <div class="legend-item" data-landuse="Agriculture" onclick="toggleLanduse(this)">
        <div class="legend-dot" style="background:var(--agriculture)"></div>
        <span class="legend-label">Agriculture</span>
        <span class="legend-count" id="cnt-Agriculture">—</span>
      </div>
      <div class="legend-item" data-landuse="Open space" onclick="toggleLanduse(this)">
        <div class="legend-dot" style="background:var(--openspace)"></div>
        <span class="legend-label">Open Space</span>
        <span class="legend-count" id="cnt-Open space">—</span>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Filters</h3>
      <div class="filter-group">
        <label>Status</label>
        <select id="filter-status" onchange="applyFilters()">
          <option value="">All statuses</option>
          <option value="Actual">Actual</option>
          <option value="Provisional">Provisional</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Land Use</label>
        <select id="filter-landuse" onchange="applyFilters()">
          <option value="">All land uses</option>
          <option value="Residential">Residential</option>
          <option value="Commercial">Commercial</option>
          <option value="Agriculture">Agriculture</option>
          <option value="Open space">Open Space</option>
        </select>
      </div>
      <button class="btn" onclick="resetFilters()">↺ Reset Filters</button>
    </div>

    <div class="sidebar-section">
      <h3>Basemap</h3>
      <select id="basemap-select" onchange="switchBasemap(this.value)">
        <option value="osm">OpenStreetMap</option>
        <option value="satellite">Satellite (Esri)</option>
        <option value="topo">Topographic</option>
        <option value="dark">Dark (CartoDB)</option>
      </select>
    </div>

    <div id="info-panel">
      <h3>Selected Parcel</h3>
      <p class="info-placeholder">
        <span>👆</span>
        Click any parcel on the map — a popup will appear with full details.
      </p>
    </div>
  </div>

  <div id="map"></div>
</div>

const COLORS = {
  'Residential': '#3b82f6',
  'Commercial':  '#f59e0b',
  'Agriculture': '#22c55e',
  'Open space':  '#a78bfa'
};
const ICONS = {
  'Residential': '🏠',
  'Commercial':  '🏢',
  'Agriculture': '🌾',
  'Open space':  '🌳'
};
function getColor(lu) { return COLORS[lu] || '#8b949e'; }
function getIcon(lu)  { return ICONS[lu]  || '📍'; }

function styleFeature(feature) {
  const lu   = feature.properties.Landuse;
  const prov = feature.properties.status === 'Provisional';
  return {
    fillColor:   getColor(lu),
    fillOpacity: prov ? 0.25 : 0.6,
    color:       prov ? '#f87171' : '#ffffff',
    weight:      prov ? 1.5 : 0.8,
    dashArray:   prov ? '4,3' : null
  };
}

// ── Map init ─────────────────────────────────────────────────
const map = L.map('map', { center:[-2.003455, 30.126884], zoom:15 });

const basemaps = {
  osm:       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',    { attribution:'© OpenStreetMap', maxZoom:19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 }),
  topo:      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',      { attribution:'© OpenTopoMap', maxZoom:17 }),
  dark:      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'© CartoDB', maxZoom:19 })
};
basemaps.osm.addTo(map);
let currentBasemap = 'osm';
L.control.scale({ position:'bottomleft', metric:true, imperial:false }).addTo(map);

// ── State ────────────────────────────────────────────────────
let geojsonLayer;
let allFeatures   = GEOJSON_DATA.features;
let hiddenLanduses = new Set();

// Count landuses for legend
const counts = {};
allFeatures.forEach(f => {
  const lu = f.properties.Landuse;
  counts[lu] = (counts[lu] || 0) + 1;
});
Object.keys(counts).forEach(lu => {
  const el = document.getElementById('cnt-' + lu);
  if (el) el.textContent = counts[lu];
});

// ── Build popup HTML ─────────────────────────────────────────
function buildPopup(p) {
  const color  = getColor(p.Landuse);
  const icon   = getIcon(p.Landuse);
  const sColor = p.status === 'Provisional' ? '#f87171' : '#22c55e';
  const sBg    = p.status === 'Provisional' ? 'rgba(248,113,113,0.15)' : 'rgba(34,197,94,0.15)';

  function prow(k, v) {
    return '<div class="popup-row"><span class="popup-key">' + k + '</span><span class="popup-val">' + v + '</span></div>';
  }

  return (
    '<div class="popup-header">' +
      '<div class="popup-header-icon">' + icon + '</div>' +
      '<div>' +
        '<div class="popup-header-title">Parcel ' + p.parcel_num + '</div>' +
        '<div class="popup-header-sub">' + p.upi + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="popup-body">' +
      prow('Land Use',
        '<span class="popup-badge" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '55">' + p.Landuse + '</span>'
      ) +
      prow('Status',
        '<span class="popup-badge" style="background:' + sBg + ';color:' + sColor + ';border:1px solid ' + sColor + '55">' + p.status + '</span>'
      ) +
      prow('Area',        Math.round(p.Shape_Area) + ' m²') +
      prow('Perimeter',   Math.round(p.Shape_Length) + ' m') +
      prow('Village',     p.village) +
      prow('Cell',        p.cell) +
      prow('Sector',      p.sector) +
      prow('District',    p.district) +
      prow('Province',    p.province) +
    '</div>'
  );
}

// ── Update sidebar info ───────────────────────────────────────
function updateSidebar(p) {
  const color  = getColor(p.Landuse);
  const sColor = p.status === 'Provisional' ? '#f87171' : '#22c55e';
  const sBg    = p.status === 'Provisional' ? 'rgba(248,113,113,0.15)' : 'rgba(34,197,94,0.15)';

  function srow(k, v) {
    return '<div class="info-row"><span class="info-key">' + k + '</span><span class="info-val">' + v + '</span></div>';
  }

  document.getElementById('info-panel').innerHTML =
    '<h3>Selected Parcel</h3>' +
    srow('Parcel No.', p.parcel_num) +
    srow('UPI', '<small>' + p.upi + '</small>') +
    srow('Land Use',
      '<span class="landuse-badge" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44">' + p.Landuse + '</span>'
    ) +
    srow('Status',
      '<span class="status-badge" style="background:' + sBg + ';color:' + sColor + ';border:1px solid ' + sColor + '44">' + p.status + '</span>'
    ) +
    srow('Area', Math.round(p.Shape_Area) + ' m²') +
    srow('Perimeter', Math.round(p.Shape_Length) + ' m') +
    srow('Village', p.village) +
    srow('Cell', p.cell) +
    srow('Sector', p.sector) +
    srow('District', p.district);
}

// ── Render layer ─────────────────────────────────────────────
let selectedLayer = null;

function renderLayer(features) {
  if (geojsonLayer) map.removeLayer(geojsonLayer);
  selectedLayer = null;

  geojsonLayer = L.geoJSON({ type:'FeatureCollection', features }, {
    style: styleFeature,
    onEachFeature(feature, layer) {
      const p = feature.properties;

      // Bind popup that opens ON the parcel
      layer.bindPopup(buildPopup(p), {
        maxWidth: 280,
        minWidth: 260,
        autoPan:  true,
        autoPanPaddingTopLeft:     L.point(20, 80),
        autoPanPaddingBottomRight: L.point(20, 20)
      });

      // Hover highlight
      layer.on('mouseover', function(e) {
        if (this !== selectedLayer) {
          this.setStyle({ weight:2.5, fillOpacity:0.85 });
          this.bringToFront();
        }
      });
      layer.on('mouseout', function() {
        if (this !== selectedLayer) {
          geojsonLayer.resetStyle(this);
        }
      });

      // Click: highlight + open popup + update sidebar
      layer.on('click', function(e) {
        // Reset previously selected
        if (selectedLayer && selectedLayer !== this) {
          geojsonLayer.resetStyle(selectedLayer);
        }
        selectedLayer = this;
        this.setStyle({ weight:3, color:'#f0a500', fillOpacity:0.9 });
        this.bringToFront();
        updateSidebar(p);
      });

      // When popup closes, reset style
      layer.on('popupclose', function() {
        if (selectedLayer === this) {
          geojsonLayer.resetStyle(this);
          selectedLayer = null;
          document.getElementById('info-panel').innerHTML =
            '<h3>Selected Parcel</h3><p class="info-placeholder"><span>👆</span>Click any parcel on the map — a popup will appear with full details.</p>';
        }
      });
    }
  }).addTo(map);

  document.getElementById('visible-count').textContent = features.length;
}

// ── Filters ──────────────────────────────────────────────────
function applyFilters() {
  const fs = document.getElementById('filter-status').value;
  const fl = document.getElementById('filter-landuse').value;
  const filtered = allFeatures.filter(f => {
    const p = f.properties;
    if (hiddenLanduses.has(p.Landuse)) return false;
    if (fs && p.status  !== fs) return false;
    if (fl && p.Landuse !== fl) return false;
    return true;
  });
  renderLayer(filtered);
}

function resetFilters() {
  document.getElementById('filter-status').value  = '';
  document.getElementById('filter-landuse').value = '';
  hiddenLanduses.clear();
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('hidden'));
  renderLayer(allFeatures);
}

function toggleLanduse(el) {
  const lu = el.dataset.landuse;
  if (hiddenLanduses.has(lu)) { hiddenLanduses.delete(lu); el.classList.remove('hidden'); }
  else                        { hiddenLanduses.add(lu);    el.classList.add('hidden');    }
  applyFilters();
}

function switchBasemap(key) {
  map.removeLayer(basemaps[currentBasemap]);
  basemaps[key].addTo(map);
  basemaps[key].bringToBack();
  currentBasemap = key;
}

// ── Boot ─────────────────────────────────────────────────────
renderLayer(allFeatures);
map.fitBounds(geojsonLayer.getBounds(), { padding:[30,30] });
</script>
